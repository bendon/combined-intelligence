server {
    listen 80;
    server_name combinedintelligence.us www.combinedintelligence.us;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name combinedintelligence.us www.combinedintelligence.us;

    ssl_certificate     /etc/letsencrypt/live/combinedintelligence.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/combinedintelligence.us/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── API proxy ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming / SSE support
        proxy_buffering    off;
        proxy_read_timeout 600s;
    }

    # ── Flower (internal only — restrict by IP or auth) ─────────────────────
    location /flower/ {
        allow 10.0.0.0/8;
        deny  all;
        proxy_pass http://127.0.0.1:5555/;
    }

    # ── Static SPA ──────────────────────────────────────────────────────────
    root /var/www/combinedintelligence.us;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other routes → SPA (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
